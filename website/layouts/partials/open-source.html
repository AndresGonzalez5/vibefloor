<section id="open-source" class="py-24">
  <div class="max-w-[1100px] mx-auto px-8 text-center">
    <div class="reveal">
      <div class="font-mono text-[0.7rem] font-semibold uppercase tracking-widest text-wine-light mb-4">{{ T "oss_label" }}</div>
      <h2 class="font-mono text-[clamp(1.6rem,3.5vw,2.2rem)] font-bold tracking-tight mb-4 leading-tight">{{ T "oss_title" }}</h2>
      <p class="text-fg-muted max-w-[560px] mx-auto leading-relaxed mb-10">{{ T "oss_desc" }}</p>
      <div class="flex gap-4 justify-center flex-wrap">
        <a href="{{ .Site.Params.githubURL }}" class="inline-flex items-center gap-2 bg-wine text-[#F7F4F3] px-6 py-3 rounded-lg font-mono text-sm font-medium border border-wine-light no-underline transition-all hover:bg-wine-light hover:-translate-y-0.5 hover:shadow-[0_8px_30px_var(--color-wine-glow)]">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          {{ T "oss_view" }}
        </a>
        <a href="{{ .Site.Params.githubURL }}" class="inline-flex items-center gap-2 bg-transparent text-fg-dim px-6 py-3 rounded-lg font-mono text-sm border border-fg-faint no-underline transition-all hover:-translate-y-0.5 hover:bg-fg-faint">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          {{ T "oss_star" }}
        </a>
      </div>
    </div>
  </div>
</section>
