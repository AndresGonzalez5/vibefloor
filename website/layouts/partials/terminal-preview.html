<div class="mt-16 animate-fade-up-4">
  <div class="relative">
    <!-- Screenshot tabs -->
    <div class="flex justify-center gap-2 mb-4">
      <button onclick="showScreenshot('agent')" class="ss-tab ss-tab-active font-mono text-xs px-3 py-1.5 rounded-md border border-fg-faint transition-all" data-tab="agent">Agent</button>
      <button onclick="showScreenshot('environment')" class="ss-tab font-mono text-xs px-3 py-1.5 rounded-md border border-fg-faint transition-all" data-tab="environment">Environment</button>
      <button onclick="showScreenshot('info')" class="ss-tab font-mono text-xs px-3 py-1.5 rounded-md border border-fg-faint transition-all" data-tab="info">Info</button>
      <button onclick="showScreenshot('terminal')" class="ss-tab font-mono text-xs px-3 py-1.5 rounded-md border border-fg-faint transition-all" data-tab="terminal">Terminal</button>
      <button onclick="showScreenshot('browser')" class="ss-tab font-mono text-xs px-3 py-1.5 rounded-md border border-fg-faint transition-all" data-tab="browser">Browser</button>
      <button onclick="showScreenshot('project')" class="ss-tab font-mono text-xs px-3 py-1.5 rounded-md border border-fg-faint transition-all" data-tab="project">Project</button>
    </div>

    <!-- Screenshots -->
    <div class="rounded-xl overflow-hidden shadow-[0_25px_80px_var(--color-shadow)] border border-fg-faint">
      <img id="ss-agent" class="ss-img w-full" src="/img/screenshots/agent.png" alt="Claude Code agent running in Factory Floor">
      <img id="ss-environment" class="ss-img w-full hidden" src="/img/screenshots/environment.png" alt="Environment tab with setup and run scripts">
      <img id="ss-info" class="ss-img w-full hidden" src="/img/screenshots/info.png" alt="Workstream info with documentation">
      <img id="ss-terminal" class="ss-img w-full hidden" src="/img/screenshots/terminal.png" alt="Ghostty terminal with custom shell">
      <img id="ss-browser" class="ss-img w-full hidden" src="/img/screenshots/browser.png" alt="Embedded browser with auto-port detection">
      <img id="ss-project" class="ss-img w-full hidden" src="/img/screenshots/project.png" alt="Project overview with git info and docs">
    </div>
  </div>
</div>

<script>
function showScreenshot(name) {
  document.querySelectorAll('.ss-img').forEach(function(img) { img.classList.add('hidden'); });
  document.querySelectorAll('.ss-tab').forEach(function(tab) {
    tab.classList.remove('ss-tab-active', 'bg-wine', 'text-[#F7F4F3]', 'border-wine');
    tab.classList.add('text-fg-muted', 'bg-transparent');
  });
  document.getElementById('ss-' + name).classList.remove('hidden');
  var activeTab = document.querySelector('[data-tab="' + name + '"]');
  activeTab.classList.add('ss-tab-active', 'bg-wine', 'text-[#F7F4F3]', 'border-wine');
  activeTab.classList.remove('text-fg-muted', 'bg-transparent');
}
// Initialize first tab
document.addEventListener('DOMContentLoaded', function() { showScreenshot('agent'); });
</script>
